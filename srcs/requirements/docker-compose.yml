services:
  mariadb:
    build: ./mariadb
    container_name: mariadb
    restart: always
    env_file:
      - .env
    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}   
    volumes:
      - mariadb_volume:/var/lib/mysql
    networks:
      - mynetwork
    secrets:
      - db_password
      - db_root_password
  
  wordpress:
    build: ./wordpress
    container_name: wordpress
    restart: always
    depends_on:
      - mariadb
    env_file:
      - .env
    environment: 
      MARIADB_HOST : ${MARIADB_HOST}
      MARIADB_HOST_PORT : ${MARIADB_HOST_PORT}
      DB_USER: ${DB_USER}
      WP_URL: ${WP_URL}
      WP_TITLE: ${WP_TITLE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      WP_USER: ${WP_USER}
      WP_USER_EMAIL: ${WP_USER_EMAIL}
      WP_ROLE: ${WP_ROLE}
    volumes:
      - wordpress_volume:/var/www/html
    networks:
      - mynetwork
    secrets:
      - db_password
      - db_root_password
      - wp_admin_password
      - wp_user_password

  nginx:
    build: ./nginx
    container_name: nginx
    restart: always
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - wordpress_volume:/var/www/html
    networks:
      - mynetwork

volumes:
  mariadb_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mobouifr/data/mysql

  wordpress_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mobouifr/data/wordpress

networks:
  mynetwork:
    driver: bridge

secrets:
  db_password:
    file: ../../secrets/db_password.txt
  db_root_password:
    file: ../../secrets/db_root_password.txt
  wp_admin_password:
    file: ../../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../../secrets/wp_user_password.txt